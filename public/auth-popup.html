<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion avec Google</title>
  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 16px;
      text-align: center;
    }
    .container {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
      max-width: 360px;
      width: 100%;
    }
    .spinner {
      border: 3px solid rgba(244, 63, 94, 0.1);
      border-top: 3px solid #f43f5e;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .text {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.5;
    }
    .error-text {
      color: #ef4444;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="loader"></div>
    <div class="title" id="title">Authentification Google</div>
    <div class="text" id="status">Veuillez autoriser le pop-up pour continuer la connexion...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    async function init() {
      const statusEl = document.getElementById('status');
      const titleEl = document.getElementById('title');
      const loaderEl = document.getElementById('loader');

      try {
        // Fetch original app configurations
        const response = await fetch('/firebase-applet-config.json');
        if (!response.ok) {
          throw new Error("Configuration Firebase introuvable.");
        }
        const config = await response.json();

        // Initialize Firebase on the top-level
        const app = initializeApp({
          apiKey: config.apiKey,
          authDomain: config.authDomain,
          projectId: config.projectId,
          storageBucket: config.storageBucket,
          messagingSenderId: config.messagingSenderId,
          appId: config.appId
        });

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // Add optional custom parameters if needed
        provider.setCustomParameters({
          prompt: 'select_account'
        });

        statusEl.innerText = "Ouverture de la fenêtre de connexion Google...";
        const result = await signInWithPopup(auth, provider);
        
        if (result.user) {
          titleEl.innerText = "Connexion Réussie";
          statusEl.innerText = "Synchronisation de votre profil en cours...";
          
          if (window.opener) {
            window.opener.postMessage({
              type: 'FIREBASE_AUTH_SUCCESS',
              user: {
                uid: result.user.uid,
                displayName: result.user.displayName,
                email: result.user.email,
                photoURL: result.user.photoURL
              }
            }, '*');
          }
          
          setTimeout(() => {
            window.close();
          }, 1500);
        }
      } catch (err) {
        console.error("Auth popup error:", err);
        loaderEl.style.display = 'none';
        titleEl.innerText = "Échec de l'authentification";
        statusEl.className = "text error-text";
        
        let message = err.message || "Erreur de communication";
        if (err.code === 'auth/popup-closed-by-user') {
          message = "La fenêtre de connexion a été fermée avant la fin de l'opération.";
        } else if (err.code === 'auth/cancelled-popup-request') {
          message = "Opération annulée par une autre requête de pop-up.";
        }
        
        statusEl.innerText = message;
        
        if (window.opener) {
          window.opener.postMessage({
            type: 'FIREBASE_AUTH_ERROR',
            error: message
          }, '*');
        }
      }
    }

    init();
  </script>
</body>
</html>
